name: app_ithub
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/v1.jpg
    - assets/images/v2.jpg
    - assets/images/v3.jpg

  fonts:
    - family: CustomFont
      fonts:
        - asset: assets/fonts/custom_font.ttf